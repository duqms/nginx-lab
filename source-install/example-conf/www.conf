server {
        listen  80;
        server_name  www.test.co.kr;
        return 301 https://$server_name$request_uri;
        }


server {
        listen  443 ssl;
        http2   on;
        server_name  test.co.kr;

        access_log  /logs/nginx/test.co.kr/ssl-test.co.kr_access.log main;
        error_log   /logs/nginx/test.co.kr/ssl-test.co.kr_error.log;

        ## SSL
        ssl_certificate /usr/local/nginx/certs/test.co.kr/combined.pem;
        ssl_certificate_key /usr/local/nginx/certs/test.co.kr/Wildcard.test.co.kr.key;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        ## http method : GET, HEAD, POST
        if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 403; }

        ## HSTS : 1년
        add_header Strict-Transport-Security "max-age=31536000;";

        ##2025.07.07 Add
        # .php 확장자 요청 차단
        location ~* \.php$ {
        return 403;
        }

        #phpadmin 관련 차단
        location ~* /php[-_]?my[-_]?admin[\w\-/\.]* {
        return 403;
        }

        location / {
                proxy_pass http://test;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_redirect off;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $host;
                proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 http_404;
                proxy_connect_timeout 180s;
                proxy_buffer_size 32k;
                proxy_buffering off;
                proxy_buffers 8 16k;
                proxy_busy_buffers_size 64k;
                proxy_temp_file_write_size 64k;
                proxy_ignore_client_abort off;
                client_max_body_size 5500m;
                client_body_buffer_size 128k;
                add_header X-XSS-Protection "1; mode=block";
                add_header Content-Security-Policy "frame-ancestors 'self' https://*.test.co.kr https://*.test.net";
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
        }

        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }

        error_page  400 403 404 /errors/test_error.html;
        error_page  500 502 503 504 /errors/test_error.html;
        location /errors/ {
            alias /usr/local/nginx/html/errors/;
            internal;
        }

    }
